<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BAi</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --panel-2: #1d212a;
        --border: #262b36;
        --text: #e6e9ef;
        --muted: #8b93a3;
        --accent: #5b8cff;
        --accent-soft: rgba(91, 140, 255, 0.14);
        --green: #3fb950;
        --red: #f85149;
        --radius: 10px;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; font: 14px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg); color: var(--text);
        display: grid; grid-template-columns: 264px 1fr; height: 100vh;
      }

      /* ---- sidebar ---- */
      aside {
        background: var(--panel); border-right: 1px solid var(--border);
        display: flex; flex-direction: column; overflow: hidden;
      }
      .brand {
        display: flex; align-items: center; gap: 8px;
        font-size: 17px; font-weight: 700; letter-spacing: .3px;
        padding: 16px 18px 12px;
      }
      .brand .logo {
        width: 26px; height: 26px; border-radius: 7px;
        background: linear-gradient(135deg, var(--accent), #8a5bff);
        display: grid; place-items: center; color: #fff; font-size: 14px;
      }
      .brand span { color: var(--accent); }
      #newThread {
        margin: 4px 14px 12px; display: flex; align-items: center;
        justify-content: center; gap: 6px;
      }
      .section-label {
        color: var(--muted); font-size: 11px; text-transform: uppercase;
        letter-spacing: .6px; padding: 8px 18px 4px;
      }
      #threads { overflow-y: auto; flex: 1; padding-bottom: 8px; }
      .thread {
        margin: 2px 8px; padding: 9px 12px; cursor: pointer; border-radius: 8px;
        color: var(--muted); transition: background .12s, color .12s;
      }
      .thread:hover { background: var(--panel-2); color: var(--text); }
      .thread.active { color: var(--text); background: var(--accent-soft); }
      .thread .title { font-weight: 500; color: inherit; }
      .thread small { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }

      /* agent legend at the bottom of the sidebar */
      #legend { border-top: 1px solid var(--border); padding: 10px 14px 14px; }
      .legend-agent { display: flex; align-items: baseline; gap: 6px; padding: 3px 0; }
      .legend-agent .tag {
        font-family: ui-monospace, monospace; color: var(--accent); font-size: 12px;
      }
      .legend-agent .role { color: var(--muted); font-size: 11px; }

      /* ---- main column ---- */
      main { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
      .topbar {
        display: flex; align-items: center; gap: 10px;
        padding: 13px 24px; border-bottom: 1px solid var(--border);
        min-height: 52px;
      }
      .topbar .title { font-weight: 600; }
      .topbar .sub { color: var(--muted); font-size: 12px; }
      #log { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }

      .entry { margin-bottom: 18px; max-width: 820px; }
      .entry .who .avatar {
        width: 18px; height: 18px; border-radius: 5px; display: grid; place-items: center;
        font-size: 11px; color: #fff; background: var(--accent);
      }
      .entry.user .who .avatar { background: #3a4250; }
      .entry .who {
        font-weight: 600; margin-bottom: 5px; display: flex; align-items: center; gap: 6px;
      }
      .entry.user .who { color: var(--muted); }
      .entry.agent .who { color: var(--accent); }
      .entry pre {
        white-space: pre-wrap; word-wrap: break-word; margin: 0;
        background: var(--panel); border: 1px solid var(--border);
        border-radius: var(--radius); padding: 12px 14px; font: inherit;
      }
      .entry.user pre { background: var(--panel-2); }
      .entry.failed pre { border-color: var(--red); }
      .entry.live pre::after {
        content: '▋'; color: var(--accent); margin-left: 1px;
        animation: blink 1s step-start infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }

      .empty { color: var(--muted); padding: 40px 24px; text-align: center; }
      .empty .big { font-size: 15px; color: var(--text); margin-bottom: 6px; }

      /* live status line */
      .status {
        display: flex; align-items: center; gap: 8px; max-width: 820px;
        margin-bottom: 14px; color: var(--muted); font-size: 13px;
      }
      .status .dot {
        width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
        animation: pulse 1s ease-in-out infinite; flex: none;
      }
      .status.ok .dot { background: var(--green); animation: none; }
      .status.fail .dot { background: var(--red); animation: none; }
      .status.fail { color: var(--red); }
      .status.tool .dot { background: #d29922; animation: none; }
      .status .mono { font-family: ui-monospace, monospace; color: var(--accent); }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

      /* ---- composer ---- */
      .composer-wrap { border-top: 1px solid var(--border); padding: 14px 24px 18px; position: relative; }
      form { display: flex; gap: 10px; align-items: flex-end; }
      .input-shell { flex: 1; position: relative; }
      textarea {
        width: 100%; resize: none; background: var(--panel); border: 1px solid var(--border);
        border-radius: var(--radius); color: var(--text); padding: 11px 13px; font: inherit;
        line-height: 1.5; max-height: 180px; min-height: 44px; overflow-y: auto;
      }
      textarea:focus { outline: none; border-color: var(--accent); }
      button {
        background: var(--accent); color: #fff; border: 0; border-radius: var(--radius);
        padding: 11px 18px; cursor: pointer; font: inherit; font-weight: 500; min-height: 44px;
        transition: background .12s, opacity .12s;
      }
      button:hover:not(:disabled) { background: #6f9bff; }
      button:disabled { opacity: .45; cursor: default; }
      button.stop { background: var(--red); }
      button.stop:hover { background: #ff6259; }
      .composer-hint { color: var(--muted); font-size: 11.5px; margin-top: 8px; }
      .composer-hint kbd {
        background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px;
        padding: 0 5px; font-family: ui-monospace, monospace; font-size: 11px;
      }

      /* ---- @mention autocomplete ---- */
      .mention-pop {
        position: absolute; bottom: calc(100% + 6px); left: 0; min-width: 280px;
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        box-shadow: 0 12px 36px rgba(0,0,0,.45); padding: 4px; z-index: 20;
        display: none;
      }
      .mention-pop.open { display: block; }
      .mention-item {
        display: flex; align-items: center; gap: 10px; padding: 8px 10px;
        border-radius: 7px; cursor: pointer;
      }
      .mention-item.active { background: var(--accent-soft); }
      /* biome-ignore lint/style/noDescendingSpecificity: this .avatar and
         .entry .who .avatar are unrelated rules that never target the same element;
         they only share the trailing class name. */
      .mention-item .avatar {
        width: 28px; height: 28px; border-radius: 7px; flex: none; display: grid;
        place-items: center; color: #fff; font-size: 13px; font-weight: 600;
        background: linear-gradient(135deg, var(--accent), #8a5bff);
      }
      .mention-item .meta { min-width: 0; }
      .mention-item .tag { font-family: ui-monospace, monospace; color: var(--accent); }
      .mention-item .name { color: var(--text); }
      .mention-item .role {
        color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <aside>
      <div class="brand"><span class="logo">B</span>B<span>Ai</span></div>
      <button type="button" id="newThread">+ New thread</button>
      <div class="section-label">Threads</div>
      <div id="threads"></div>
      <div id="legend"></div>
    </aside>
    <main>
      <div class="topbar">
        <div>
          <div class="title" id="threadTitle">BAi</div>
          <div class="sub" id="threadSub">Pick or create a thread to start.</div>
        </div>
      </div>
      <div id="log">
        <div class="empty">
          <div class="big">No thread selected</div>
          Create a thread, then @mention an agent to put it to work.
        </div>
      </div>
      <div class="composer-wrap">
        <form id="composer">
          <div class="input-shell">
            <div class="mention-pop" id="mentionPop"></div>
            <textarea id="message" rows="1" placeholder="@claude design it, then @codex review…" autocomplete="off" disabled></textarea>
          </div>
          <button type="submit" id="sendBtn" disabled>Send</button>
        </form>
        <div class="composer-hint">
          <kbd>@</kbd> to mention an agent · <kbd>Enter</kbd> to send · <kbd>Shift</kbd>+<kbd>Enter</kbd> for newline
        </div>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
