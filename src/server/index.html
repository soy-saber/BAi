<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BAi</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --border: #262b36;
        --text: #e6e9ef;
        --muted: #8b93a3;
        --accent: #5b8cff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font: 14px/1.5 system-ui, sans-serif;
        background: var(--bg); color: var(--text); height: 100vh;
        display: grid; grid-template-columns: 240px 1fr;
      }
      aside {
        background: var(--panel); border-right: 1px solid var(--border);
        display: flex; flex-direction: column; overflow: hidden;
      }
      aside h1 { font-size: 16px; margin: 16px; letter-spacing: .5px; }
      aside h1 span { color: var(--accent); }
      #threads { overflow-y: auto; flex: 1; }
      .thread {
        padding: 10px 16px; cursor: pointer; border-left: 2px solid transparent;
        color: var(--muted);
      }
      .thread:hover { background: #1d212a; }
      .thread.active { color: var(--text); border-left-color: var(--accent); background: #1d212a; }
      .thread small { display: block; color: var(--muted); }
      #newThread { margin: 12px 16px; }
      button {
        background: var(--accent); color: #fff; border: 0; border-radius: 6px;
        padding: 8px 12px; cursor: pointer; font: inherit;
      }
      button:disabled { opacity: .5; cursor: default; }
      button.stop { background: #f85149; }
      main { display: flex; flex-direction: column; overflow: hidden; }
      #log { flex: 1; overflow-y: auto; padding: 24px; }
      .entry { margin-bottom: 18px; max-width: 760px; }
      .entry .who { font-weight: 600; margin-bottom: 4px; }
      .entry.user .who { color: var(--muted); }
      .entry.agent .who { color: var(--accent); }
      .entry pre {
        white-space: pre-wrap; word-wrap: break-word; margin: 0;
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 8px; padding: 12px; font: inherit;
      }
      .entry.failed pre { border-color: #f85149; }
      /* blinking caret while a bubble is still streaming */
      .entry.live pre::after {
        content: '▋'; color: var(--accent); margin-left: 1px;
        animation: blink 1s step-start infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }
      form { display: flex; gap: 8px; padding: 16px 24px; border-top: 1px solid var(--border); }
      input {
        flex: 1; background: var(--panel); border: 1px solid var(--border);
        border-radius: 6px; color: var(--text); padding: 10px 12px; font: inherit;
      }
      .hint { color: var(--muted); padding: 0 24px 12px; font-size: 12px; }
      .empty { color: var(--muted); padding: 24px; }
      /* live status line shown while an agent is working */
      .status {
        display: flex; align-items: center; gap: 8px; max-width: 760px;
        margin-bottom: 18px; color: var(--muted); font-size: 13px;
      }
      .status .dot {
        width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
        animation: pulse 1s ease-in-out infinite;
      }
      .status.ok .dot { background: #3fb950; animation: none; }
      .status.fail .dot { background: #f85149; animation: none; }
      .status.fail { color: #f85149; }
      .status .tool { color: var(--accent); font-family: ui-monospace, monospace; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
  </head>
  <body>
    <aside>
      <h1>B<span>Ai</span></h1>
      <button type="button" id="newThread">+ New thread</button>
      <div id="threads"></div>
    </aside>
    <main>
      <div id="log"><div class="empty">Pick or create a thread to start.</div></div>
      <div class="hint">Mention agents to route: <code>@claude</code>, <code>@codex</code>. Agents can hand off to each other.</div>
      <form id="composer">
        <input id="message" placeholder="@claude design it, then @codex review…" autocomplete="off" disabled />
        <button type="submit" id="sendBtn" disabled>Send</button>
      </form>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
