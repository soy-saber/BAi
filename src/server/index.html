<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BAi</title>
    <style>
      :root {
        --bg: #0b0d10;
        --panel: #12161f;
        --panel-2: #1a1f2c;
        --border: #222938;
        --text: #f0f3f8;
        --muted: #949eb4;
        /* accent = the human/brand color; agent = the AI voice. Keeping them
           distinct makes "you" vs "an agent" legible at a glance. */
        --accent: #ff7a59;
        --accent-soft: rgba(255, 122, 89, 0.12);
        --agent: #5b8cff;
        --agent-soft: rgba(91, 140, 255, 0.12);
        --green: #2ea043;
        --red: #f85149;
        --radius: 12px;
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; font: 14px/1.55 system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg); color: var(--text);
        display: grid; grid-template-columns: 264px 1fr; height: 100vh;
      }

      /* ---- sidebar ---- */
      aside {
        background: var(--panel); border-right: 1px solid var(--border);
        display: flex; flex-direction: column; overflow: hidden;
      }
      .brand {
        display: flex; align-items: center; gap: 8px;
        font-size: 17px; font-weight: 700; letter-spacing: .3px;
        padding: 16px 18px 12px;
      }
      .brand .logo {
        width: 26px; height: 26px; border-radius: 7px;
        background: linear-gradient(135deg, var(--accent), #8a5bff);
        display: grid; place-items: center; color: #fff; font-size: 14px;
      }
      .brand span { color: var(--accent); }
      #newThread {
        margin: 4px 14px 12px; display: flex; align-items: center;
        justify-content: center; gap: 6px;
      }
      .section-label {
        color: var(--muted); font-size: 11px; text-transform: uppercase;
        letter-spacing: .6px; padding: 8px 18px 4px;
      }
      #threads { overflow-y: auto; flex: 1; padding-bottom: 8px; }
      .thread {
        margin: 2px 8px; padding: 9px 12px; cursor: pointer; border-radius: 8px;
        color: var(--muted); transition: background .12s, color .12s;
      }
      .thread:hover { background: var(--panel-2); color: var(--text); }
      .thread.active { color: var(--text); background: var(--accent-soft); }
      .thread .title { font-weight: 500; color: inherit; }
      .thread small { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }

      /* agent legend at the bottom of the sidebar */
      #legend { border-top: 1px solid var(--border); padding: 10px 14px 14px; }
      .legend-agent { display: flex; align-items: baseline; gap: 6px; padding: 3px 0; }
      .legend-agent .tag {
        font-family: ui-monospace, monospace; color: var(--accent); font-size: 12px;
      }
      .legend-agent .role { color: var(--muted); font-size: 11px; }

      /* ---- git panel ---- */
      #gitPanel { border-top: 1px solid var(--border); }
      #gitPanel .git-head {
        display: flex; align-items: center; gap: 6px; cursor: pointer;
        padding: 9px 14px 7px; color: var(--muted); user-select: none;
      }
      #gitPanel .git-head:hover { color: var(--text); }
      #gitPanel .git-head .label {
        font-size: 11px; text-transform: uppercase; letter-spacing: .6px; flex: 1;
      }
      #gitPanel .git-head .branch {
        font-family: ui-monospace, monospace; font-size: 11px; color: var(--agent-color);
        text-transform: none; letter-spacing: 0; max-width: 110px; overflow: hidden;
        text-overflow: ellipsis; white-space: nowrap;
      }
      #gitPanel .git-head .count {
        background: var(--accent-soft); color: var(--accent); border-radius: 9px;
        padding: 0 7px; font-size: 11px; min-width: 18px; text-align: center;
      }
      #gitFiles { max-height: 220px; overflow-y: auto; padding-bottom: 6px; }
      #gitPanel .git-head .caret { transition: transform .12s; font-size: 10px; }
      #gitPanel.collapsed .git-head .caret { transform: rotate(-90deg); }
      #gitPanel.collapsed #gitFiles { display: none; }
      .git-file {
        display: flex; align-items: center; gap: 8px; padding: 4px 14px;
        cursor: pointer; font-size: 12px; color: var(--muted);
      }
      .git-file:hover { background: var(--panel-2); color: var(--text); }
      .git-file.active { background: var(--accent-soft); color: var(--text); }
      .git-file .xy {
        font-family: ui-monospace, monospace; font-size: 11px; width: 18px; flex: none;
        text-align: center; border-radius: 4px; padding: 1px 0;
      }
      .git-file .xy.staged { color: var(--green); }
      .git-file .xy.unstaged { color: #d29922; }
      .git-file .xy.untracked { color: var(--muted); }
      .git-file .name {
        flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        direction: rtl; text-align: left;
      }
      .git-empty { color: var(--muted); font-size: 12px; padding: 4px 14px 10px; }

      /* diff overlay */
      .diff-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 40;
        display: none; align-items: center; justify-content: center; padding: 32px;
      }
      .diff-overlay.open { display: flex; }
      .diff-modal {
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        width: min(960px, 100%); max-height: 100%; display: flex; flex-direction: column;
        box-shadow: 0 18px 50px rgba(0,0,0,.5);
      }
      .diff-modal .diff-head {
        display: flex; align-items: center; gap: 10px; padding: 12px 16px;
        border-bottom: 1px solid var(--border);
      }
      .diff-modal .diff-head .diff-file {
        flex: 1; font-family: ui-monospace, monospace; font-size: 13px; color: var(--text);
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .diff-modal .diff-head .diff-close {
        min-height: 0; padding: 5px 12px; background: var(--panel-2); color: var(--muted);
        border: 1px solid var(--border);
      }
      .diff-modal .diff-head .diff-close:hover:not(:disabled) { background: var(--border); color: var(--text); }
      .diff-body {
        overflow: auto; padding: 12px 0; margin: 0; font-family: ui-monospace, monospace;
        font-size: 12.5px; line-height: 1.5;
      }
      .diff-body .dl { display: block; padding: 0 16px; white-space: pre-wrap; word-break: break-all; }
      .diff-body .dl.add { background: rgba(46,160,67,.14); color: #7ee787; }
      .diff-body .dl.del { background: rgba(248,81,73,.14); color: #ff9a93; }
      .diff-body .dl.hunk { color: var(--agent-color); background: var(--agent-soft); }
      .diff-body .dl.meta { color: var(--muted); }
      .diff-empty { color: var(--muted); padding: 24px; text-align: center; }

      /* ---- main column ---- */
      main { display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
      .topbar {
        display: flex; align-items: center; gap: 10px;
        padding: 13px 24px; border-bottom: 1px solid var(--border);
        min-height: 52px;
      }
      .topbar .title { font-weight: 600; }
      .topbar .sub { color: var(--muted); font-size: 12px; }
      #log { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }

      .entry { margin-bottom: 18px; max-width: 820px; }
      .entry .who .avatar {
        width: 24px; height: 24px; border-radius: 6px; display: grid; place-items: center;
        font-size: 12px; font-weight: 600; color: #fff; background: var(--agent-color);
      }
      .entry.user .who .avatar { background: #4a5568; }
      .entry.failed .who .avatar { background: var(--red); }
      .entry .who {
        font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        font-size: 13px;
      }
      .entry.user .who { color: var(--muted); }
      .entry.agent .who { color: var(--agent-color); }
      .entry pre {
        white-space: pre-wrap; word-wrap: break-word; margin: 0;
        background: var(--panel); border: 1px solid var(--border); padding: 14px 16px;
        border-radius: var(--radius); font: inherit; line-height: 1.6;
      }
      .entry.user pre { background: var(--panel-2); }
      .entry.agent pre { border-left: 3px solid var(--agent-color); }
      .entry.failed pre { border-color: var(--red); }
      .entry.live pre::after {
        content: '▋'; color: var(--accent); margin-left: 1px;
        animation: blink 1s step-start infinite;
      }
      @keyframes blink { 50% { opacity: 0; } }

      .empty { color: var(--muted); padding: 40px 24px; text-align: center; }
      .empty .big { font-size: 15px; color: var(--text); margin-bottom: 6px; }

      /* live status line */
      .status {
        display: flex; align-items: center; gap: 8px; max-width: 820px;
        margin-bottom: 14px; color: var(--muted); font-size: 13px;
      }
      .status .dot {
        width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
        animation: pulse 1s ease-in-out infinite; flex: none;
      }
      .status.ok .dot { background: var(--green); animation: none; }
      .status.fail .dot { background: var(--red); animation: none; }
      .status.fail { color: var(--red); }
      .status.tool .dot { background: #d29922; animation: none; }
      .status.file .dot { background: var(--agent-color); animation: none; }
      .status.file { color: var(--agent-color); }
      .status.stage .dot { background: var(--accent); animation: none; }
      .status.stage { color: var(--accent); font-weight: 600; }
      .status .mono { font-family: ui-monospace, monospace; color: var(--accent); }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

      /* ---- composer ---- */
      .composer-wrap { border-top: 1px solid var(--border); padding: 14px 24px 18px; position: relative; }
      form { display: flex; gap: 10px; align-items: flex-end; }
      .input-shell { flex: 1; position: relative; }
      textarea {
        width: 100%; resize: none; background: var(--panel); border: 1px solid var(--border);
        border-radius: var(--radius); color: var(--text); padding: 11px 13px; font: inherit;
        line-height: 1.5; max-height: 180px; min-height: 44px; overflow-y: auto;
      }
      textarea:focus { outline: none; border-color: var(--accent); }
      button {
        background: var(--accent); color: #fff; border: 0; border-radius: var(--radius);
        padding: 11px 18px; cursor: pointer; font: inherit; font-weight: 500; min-height: 44px;
        transition: background .12s, opacity .12s;
      }
      button:hover:not(:disabled) { background: #6f9bff; }
      button:disabled { opacity: .45; cursor: default; }
      button.stop { background: var(--red); }
      button.stop:hover { background: #ff6259; }
      button.audit { background: transparent; color: var(--muted); border: 1px solid var(--border); }
      button.audit:hover:not(:disabled) { background: var(--agent-soft); color: var(--text); border-color: var(--agent-color); }
      .composer-hint { color: var(--muted); font-size: 11.5px; margin-top: 8px; }
      .composer-hint kbd {
        background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px;
        padding: 0 5px; font-family: ui-monospace, monospace; font-size: 11px;
      }

      /* ---- @mention autocomplete ---- */
      .mention-pop {
        position: absolute; bottom: calc(100% + 6px); left: 0; min-width: 280px;
        background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
        box-shadow: 0 12px 36px rgba(0,0,0,.45); padding: 4px; z-index: 20;
        display: none;
      }
      .mention-pop.open { display: block; }
      .mention-item {
        display: flex; align-items: center; gap: 10px; padding: 8px 10px;
        border-radius: 7px; cursor: pointer;
      }
      .mention-item.active { background: var(--accent-soft); }
      /* biome-ignore lint/style/noDescendingSpecificity: this .avatar and
         .entry .who .avatar are unrelated rules that never target the same element;
         they only share the trailing class name. */
      .mention-item .avatar {
        width: 28px; height: 28px; border-radius: 7px; flex: none; display: grid;
        place-items: center; color: #fff; font-size: 13px; font-weight: 600;
        background: linear-gradient(135deg, var(--accent), #8a5bff);
      }
      .mention-item .meta { min-width: 0; }
      .mention-item .tag { font-family: ui-monospace, monospace; color: var(--accent); }
      .mention-item .name { color: var(--text); }
      .mention-item .role {
        color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <aside>
      <div class="brand"><span class="logo">B</span>B<span>Ai</span></div>
      <button type="button" id="newThread">+ New thread</button>
      <div class="section-label">Threads</div>
      <div id="threads"></div>
      <div id="gitPanel"></div>
      <div id="legend"></div>
    </aside>
    <main>
      <div class="topbar">
        <div>
          <div class="title" id="threadTitle">BAi</div>
          <div class="sub" id="threadSub">Pick or create a thread to start.</div>
        </div>
      </div>
      <div id="log">
        <div class="empty">
          <div class="big">No thread selected</div>
          Create a thread, then @mention an agent to put it to work.
        </div>
      </div>
      <div class="composer-wrap">
        <form id="composer">
          <div class="input-shell">
            <div class="mention-pop" id="mentionPop"></div>
            <textarea id="message" rows="1" placeholder="@claude design it, then @codex review…" autocomplete="off" disabled></textarea>
          </div>
          <button type="button" id="auditBtn" class="audit" title="Security audit: one agent finds vulnerability flows, another verifies each" disabled>🛡 Audit</button>
          <button type="submit" id="sendBtn" disabled>Send</button>
        </form>
        <div class="composer-hint">
          <kbd>@</kbd> to mention an agent · <kbd>@file:</kbd>path to feed a file · <kbd>🛡 Audit</kbd> to find+verify vulns · <kbd>Enter</kbd> to send · <kbd>Shift</kbd>+<kbd>Enter</kbd> for newline
        </div>
      </div>
    </main>
    <div class="diff-overlay" id="diffOverlay">
      <div class="diff-modal">
        <div class="diff-head">
          <span class="diff-file" id="diffFile"></span>
          <button type="button" class="diff-close" id="diffClose" title="Close">✕</button>
        </div>
        <pre class="diff-body" id="diffBody"></pre>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
